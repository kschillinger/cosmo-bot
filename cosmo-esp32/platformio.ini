; Cosmo Bot — ESP32-C3-DevKitM-1 firmware
; Phase 1: UART listener + hardcoded BOT_RESPONSE.

[env:esp32-c3-devkitm-1]
platform     = espressif32
board        = esp32-c3-devkitm-1
framework    = arduino
upload_speed = 921600
monitor_speed = 115200

; Route Arduino `Serial` to the C3's native USB-Serial-JTAG (the USB-C jack
; on the DevKitM-1 connects directly to GPIO18/19).  This way `pio device
; monitor` sees our Serial.println debug output.
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
