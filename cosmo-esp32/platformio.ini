; Cosmo Bot — ESP32-C3-DevKitM-1 firmware
; Phase 3: dialogue engine on top of the Phase 1 UART link.

[env:esp32-c3-devkitm-1]
platform      = espressif32
board         = esp32-c3-devkitm-1
framework     = arduino
upload_speed  = 921600
monitor_speed = 115200

; ---- USB-Serial-JTAG (build-side) ----------------------------------------
; The ESP32-C3 has a built-in USB-Serial-JTAG peripheral. The DevKitM-1's
; USB-C jack is wired directly to GPIO18/GPIO19 — no external USB-UART chip.
;
;   ARDUINO_USB_MODE=1         -> use hardware CDC (the chip's native USB)
;   ARDUINO_USB_CDC_ON_BOOT=1  -> route Arduino's `Serial` object to USB
;
; With these set, `Serial` is the USB-CDC stream visible on the host's COM
; port; UART0 (GPIO20/21) becomes `Serial0` and is unused here.
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; ---- Monitor (host-side) -------------------------------------------------
; On the C3's native USB-CDC the DTR and RTS lines are wired to the chip's
; auto-reset and bootloader-trigger logic. Many terminal programs assert
; these lines when they open a COM port, which forces the chip into the
; bootloader and produces the classic symptom: ROM boot messages, then
; silence, even though the sketch is running fine.
;
; These settings tell `pio device monitor` to leave DTR/RTS deasserted.
; If you use Tera Term instead, set its DTR/RTS off explicitly under
; Setup -> Serial port (or just switch to `pio device monitor`, which is
; more reliable across USB re-enumeration anyway).
monitor_dtr = 0
monitor_rts = 0

; ---- Why no monitor_filters (READ ME IF YOU EVER SEE A BLANK MONITOR) ----
; Phase 1 had `monitor_filters = esp32_exception_decoder`. That filter
; works by *buffering* stdout to look for crash backtrace patterns and
; then symbolicating addresses against the ELF. On a C3 freshly out of
; reset via USB-CDC, the buffering eats the first ~1 s of prints —
; exactly the window the startup banner lives in. The result was
; "I flashed but the monitor is blank", even though the sketch was
; running fine. Disconnecting and reconnecting eventually showed
; something, but the boot banner was always gone.
;
; The fix is on both sides:
;   - main.cpp calls Serial.setTxTimeoutMs(0) and waits 2000 ms before
;     printing the banner, so prints aren't lost to the enumeration
;     window and don't block when the monitor isn't open yet.
;   - We drop esp32_exception_decoder here. If you ever need a backtrace
;     decoded during crash debugging, temporarily re-add the line below
;     (and revert before pushing):
;
;       monitor_filters = esp32_exception_decoder
;
; Default behavior (no filters) is a raw passthrough, which is what we
; want for normal development.
