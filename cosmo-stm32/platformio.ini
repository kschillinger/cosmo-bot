; Cosmo Bot — STM32L476RG (Nucleo-64) firmware
; Phase 1: UART link with ESP32-C3, hardcoded test message on button press.

[platformio]
default_envs    = nucleo_l476rg_oled_demo

[env:nucleo_l476rg]
platform        = ststm32
board           = nucleo_l476rg
framework       = stm32cube
upload_protocol = stlink
debug_tool      = stlink

; ST-Link USB-VCP is on USART2 — this is what `pio device monitor` will see.
monitor_speed   = 115200

build_flags =
    -D HSE_VALUE=8000000
    -D USE_HAL_DRIVER
    -O2
    -Wall
    -Wextra
    -Wno-unused-parameter

build_unflags =
    -Os

[env:nucleo_l476rg_oled_demo]
platform        = ststm32
board           = nucleo_l476rg
framework       = stm32cube
upload_protocol = stlink
debug_tool      = stlink
monitor_speed   = 115200
build_flags =
    -D HSE_VALUE=8000000
    -D USE_HAL_DRIVER
    -O2
    -Wall
    -Wextra
    -Wno-unused-parameter
build_unflags =
    -Os
build_src_filter =
    +<*>
    -<main.c>

[env:native_oled_tests]
platform         = native
test_framework   = unity
test_filter      = test_oled_canvas
test_build_src   = yes
build_src_filter =
    +<native_oled_tests_main.c>
